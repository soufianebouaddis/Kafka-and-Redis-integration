server:
  port: 8082

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/inventory_db
    username: postgres
    password:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
        shutdown-timeout: 100ms

kafka:
  bootstrap-servers: localhost:9092
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
    acks: all
    retries: 3
    properties:
      enable.idempotence: true
      max.in.flight.requests.per.connection: 5
      compression.type: snappy
      linger.ms: 10
      batch.size: 16384

  # Consumer (Inventory consumes from Order Service topics)
  consumer:
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
    group-id: inventory-service-group
    auto-offset-reset: earliest
    enable-auto-commit: false
    properties:
      spring.json.trusted.packages: "*"
      spring.json.use.type.headers: false
      isolation.level: read_committed  #
      max.poll.records: 500
      max.poll.interval.ms: 300000
      session.timeout.ms: 10000
      heartbeat.interval.ms: 3000

  listener:
    ack-mode: manual
    concurrency: 3



app:
  kafka:
    topics:
      order-created: order.created
      order-failed:  order.failed
      inventory-response: inventory.response

  redis:
    inventory-prefix: "inventory:"
    reservation-prefix: "reservation:"
    lock-prefix: "lock:inventory:"
    stock-ttl: 300
    reservation-ttl: 600
    lock-ttl: 30

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.ecommerce.inventory: DEBUG
    org.springframework.kafka: WARN
    org.springframework.data.redis: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
